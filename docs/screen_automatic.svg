<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="900" height="650" fill="#f2f2f7"/>
  <rect x="30" y="24" width="840" height="602" rx="28" fill="#ffffff" stroke="#e5e5ea" filter="url(#shadow)"/>

  <!-- window chrome -->
  <circle cx="62" cy="58" r="6" fill="#ff5f57"/>
  <circle cx="82" cy="58" r="6" fill="#febc2e"/>
  <circle cx="102" cy="58" r="6" fill="#28c840"/>
  <text x="450" y="63" text-anchor="middle" font-size="13" font-weight="500" fill="#8e8e93">SON Light Control</text>
  <line x1="30" y1="86" x2="870" y2="86" stroke="#f2f2f7"/>

  <!-- page: Automatic Mode -->
  <text x="450" y="170" text-anchor="middle" font-size="27" font-weight="700" fill="#1c1c1e">Automatic Mode</text>
  <text x="450" y="232" text-anchor="middle" font-size="19" font-weight="600" fill="#1c1c1e">Light intensity: 75%</text>

  <!-- intensity slider (value 75%) -->
  <rect x="150" y="272" width="600" height="6" rx="3" fill="#e5e5ea"/>
  <rect x="150" y="272" width="450" height="6" rx="3" fill="#0a84ff"/>
  <circle cx="600" cy="275" r="11" fill="#ffffff" stroke="#d2d2d7"/>

  <!-- Confirm button -->
  <rect x="150" y="352" width="600" height="56" rx="12" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="450" y="387" text-anchor="middle" font-size="17" font-weight="600" fill="#0a84ff">Confirm</text>

  <!-- Back button -->
  <rect x="150" y="428" width="600" height="56" rx="12" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="450" y="463" text-anchor="middle" font-size="17" font-weight="500" fill="#1c1c1e">Back</text>
</svg>
